# ai_draw_plugin 配置文件
# AI 绘图插件，命令前缀 /ad

[plugin]
enabled = true
config_version = "2.0.0"
send_mode = "direct"
force_forward_when_nsfw_off = true
use_http_direct = false
napcat_http_url = "http://127.0.0.1:5780"
napcat_http_token = ""
y_apply_artist_preset = false

[admin]
admin_users = ["123456789"]
default_admin_mode = false

[prompt_generator]
model_name = "deepseek-v4-flash"
api_base = "https://api.deepseek.com"
api_key = ""
output_format = "json"
selfie_appearance_policy = "auto"
enforce_tag_order = false
scene_llm_enabled = true
temperature = 0.2
max_tokens = 4000
prompt_template = ""
inherit_ttl = 3600

[auto_recall]
enabled = true
delay_seconds = 50
allowed_groups = []

[nsfw_filter]
enabled = true
filter_tags = "{{{{{nsfw}}}}}"

[prompt_show]
enabled = false
hide_selfie_prompt_add = false
selfie_prompt_add = "1girl, long brown hair"
negative_prompt_add = ""
selfie_ref_image = ""

# 全局风格预设（画师串）；模型里用 artist_preset = "名称" 引用
[artist_presets]
[[artist_presets.presets]]
name = "无"
prompt = ""
[[artist_presets.presets]]
name = "超漂亮好看"
prompt = "0.7::nekodayo22,::, 0.8::qiandaiyiyu::, 0.85::aiue oka::, 0.9::lunch (shin new)::, 1.1::cola (gotouryouta)::, 1.3::dishwasher1910,::, 1.4::healthyman::, 1.65::freng::, 1.7::quasarcake::, 1.75::kim eb::, 1.8::wanke::"

# 提示词预设（/ad y 命令使用）
[styles]
[[styles.presets]]
name = "像素风"
prompt = "pixel art style, 16-bit color palette, blocky pixels, retro game aesthetic, sharp edges, nostalgic vibe"
[[styles.presets]]
name = "线描"
prompt = "line art style, single weight lines, no shading, white background, clean contours, vector-like precision"

[random_scene]
temperature = 1.0
max_tokens = 200

[custom_prompt]
system_prompt = ""

